name: Deploy API to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with Docker (Ubuntu 18.04 for glibc compatibility)
        run: |
          docker run \
            --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace/backend \
            -e CGO_ENABLED=1 \
            ubuntu:18.04 \
            bash -c " \
              apt-get update && apt-get install -y gcc libc6-dev && \
              go build -o bin/server ./cmd/server"

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Create deployment directory
        run: |
          ssh -o StrictHostKeyChecking=no ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }} \
            "mkdir -p /root/ai-payrecord/bin /root/ai-payrecord/config /root/ai-payrecord/data /root/ai-payrecord/logs"

      - name: Upload binary
        run: |
          scp -o StrictHostKeyChecking=no ./backend/bin/server \
            ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}:/root/ai-payrecord/bin/server

      - name: Restart service
        run: |
          ssh -o StrictHostKeyChecking=no ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }} \
            "systemctl restart ai-payrecord || true"
