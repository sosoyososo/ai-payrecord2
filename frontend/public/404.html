<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA fallback - redirect 404s to index.html
    var path = window.location.pathname;
    var search = window.location.search || '';
    window.location.replace('/' + path + search);
  </script>
</head>
<body>
  <p>Redirecting to app...</p>
</body>
</html>
